name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: us-central1
  SERVICE_NAME: resumator-backend

jobs:
  deploy:
    name: Cloud Run deploy
    runs-on: ubuntu-latest
    if: github.repository != '' # always true — placeholder guard for forks without secrets
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: backend
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/resumator/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/resumator/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image="$IMAGE" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=1 \
            --timeout=300 \
            --allow-unauthenticated

      # Runtime secrets (SUPABASE_URL, UPSTASH_*, GEMINI_API_KEY, etc.) must be
      # configured on the Cloud Run service — see docs/phase-6/architectural-context-ledger.md
